<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>个人知识引擎</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; background: #0a0a1a; color: #fff; overflow: hidden; height: 100vh; }

/* 3D 场景占满屏幕 */
#canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

/* 顶部标题 */
.header { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; pointer-events: none; }
.header h1 { font-size: 22px; font-weight: 300; letter-spacing: 4px; color: rgba(255,255,255,0.6); }
.header p { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 4px; }

/* 侧边工具栏 */
.toolbar { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); z-index: 10; display: flex; flex-direction: column; gap: 10px; }
.toolbar button { width: 44px; height: 44px; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; background: rgba(20,20,40,0.7); backdrop-filter: blur(10px); color: #fff; font-size: 18px; cursor: pointer; transition: all 0.3s; }
.toolbar button:hover { background: rgba(80,120,255,0.3); border-color: rgba(80,120,255,0.5); transform: scale(1.1); }
.toolbar button.active { background: rgba(80,120,255,0.4); border-color: #5080ff; }

/* 面板通用样式 */
.panel { position: fixed; right: -400px; top: 0; width: 380px; height: 100%; background: rgba(15,15,35,0.92); backdrop-filter: blur(20px); border-left: 1px solid rgba(255,255,255,0.1); z-index: 20; transition: right 0.4s cubic-bezier(0.22, 1, 0.36, 1); padding: 24px; overflow-y: auto; }
.panel.open { right: 0; }
.panel h2 { font-size: 16px; font-weight: 400; color: rgba(255,255,255,0.7); margin-bottom: 16px; letter-spacing: 2px; }
.panel .close-btn { position: absolute; top: 20px; right: 20px; width: 32px; height: 32px; border: none; border-radius: 8px; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 14px; }

/* 添加知识表单 */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 6px; letter-spacing: 1px; }
.form-group input, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; background: rgba(255,255,255,0.05); color: #fff; font-size: 14px; outline: none; transition: border 0.3s; font-family: inherit; }
.form-group input:focus, .form-group textarea:focus { border-color: rgba(80,120,255,0.5); }
.form-group textarea { height: 120px; resize: vertical; }
.form-group input[type="text"] { height: 42px; }
.submit-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: linear-gradient(135deg, #5080ff, #6c5ce7); color: #fff; font-size: 14px; cursor: pointer; transition: opacity 0.3s; }
.submit-btn:hover { opacity: 0.85; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* 问答界面 */
.chat-messages { height: 300px; overflow-y: auto; margin-bottom: 14px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; max-width: 90%; }
.chat-msg.user { background: rgba(80,120,255,0.2); align-self: flex-end; border-bottom-right-radius: 2px; }
.chat-msg.ai { background: rgba(255,255,255,0.06); align-self: flex-start; border-bottom-left-radius: 2px; }
.chat-msg .source { font-size: 11px; color: rgba(80,120,255,0.6); margin-top: 6px; }
.chat-input-row { display: flex; gap: 8px; }
.chat-input-row input { flex: 1; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; background: rgba(255,255,255,0.05); color: #fff; font-size: 13px; outline: none; }
.chat-input-row input:focus { border-color: rgba(80,120,255,0.5); }
.chat-input-row button { padding: 10px 18px; border: none; border-radius: 8px; background: linear-gradient(135deg, #5080ff, #6c5ce7); color: #fff; cursor: pointer; }

/* 知识列表 */
.knowledge-list { display: flex; flex-direction: column; gap: 8px; }
.knowledge-card { padding: 12px 16px; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; background: rgba(255,255,255,0.03); cursor: pointer; transition: all 0.3s; }
.knowledge-card:hover { background: rgba(80,120,255,0.1); border-color: rgba(80,120,255,0.3); }
.knowledge-card h3 { font-size: 13px; font-weight: 400; margin-bottom: 4px; }
.knowledge-card p { font-size: 11px; color: rgba(255,255,255,0.4); }

/* 球体提示 */
.tooltip { position: fixed; z-index: 5; pointer-events: none; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 12px 16px; color: #fff; font-size: 13px; max-width: 250px; display: none; line-height: 1.5; }
.tooltip .tt-title { color: #5080ff; font-size: 14px; margin-bottom: 4px; }
.tooltip .tt-preview { color: rgba(255,255,255,0.5); font-size: 11px; }

/* 加载状态 */
.loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #0a0a1a; z-index: 100; transition: opacity 2s; }
.loading.hidden { opacity: 0; pointer-events: none; }
.loading .spinner { width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #5080ff; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 计数 */
.node-count { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 5; font-size: 12px; color: rgba(255,255,255,0.2); letter-spacing: 2px; pointer-events: none; }

/* 空状态 */
.empty-state { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.3); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 13px; }

/* 滚动条 */
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

/* 知识详情弹窗 */
.detail-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 500px; max-width: 90vw; max-height: 70vh; background: rgba(15,15,35,0.96); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 28px; z-index: 50; opacity: 0; pointer-events: none; transition: all 0.4s; overflow-y: auto; }
.detail-modal.open { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
.detail-modal h2 { font-size: 18px; font-weight: 500; margin-bottom: 12px; color: #fff; }
.detail-modal .content { font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.8); white-space: pre-wrap; }
.detail-modal .keywords { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
.detail-modal .keywords span { padding: 3px 10px; border-radius: 20px; background: rgba(80,120,255,0.15); color: rgba(80,120,255,0.8); font-size: 11px; }
.detail-modal .close-btn { position: absolute; top: 16px; right: 16px; width: 30px; height: 30px; border: none; border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff; cursor: pointer; }
.detail-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 45; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
.detail-backdrop.open { opacity: 1; pointer-events: all; }
</style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div></div>

<div id="canvas-container"></div>

<div class="header">
  <h1>✦ 知识宇宙</h1>
  <p id="nodeCountText">加载中...</p>
</div>

<div class="toolbar">
  <button onclick="togglePanel('add')" title="添加知识">+</button>
  <button onclick="togglePanel('ask')" title="AI问答">?</button>
  <button onclick="togglePanel('list')" title="知识列表">☰</button>
</div>

<div id="panel-add" class="panel">
  <button class="close-btn" onclick="togglePanel('add')">✕</button>
  <h2>添加知识</h2>
  <div class="form-group">
    <label>标题</label>
    <input type="text" id="input-title" placeholder="给这段知识起个名字">
  </div>
  <div class="form-group">
    <label>内容</label>
    <textarea id="input-content" placeholder="写下你的知识内容...&#10;支持纯文本，将来会支持图片"></textarea>
  </div>
  <button class="submit-btn" onclick="addKnowledge()">存入知识宇宙</button>
</div>

<div id="panel-ask" class="panel">
  <button class="close-btn" onclick="togglePanel('ask')">✕</button>
  <h2>AI 问答</h2>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-msg ai">你好！问我关于知识库的问题吧。</div>
  </div>
  <div class="chat-input-row">
    <input id="chatInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter') askQuestion()">
    <button onclick="askQuestion()">发送</button>
  </div>
</div>

<div id="panel-list" class="panel">
  <button class="close-btn" onclick="togglePanel('list')">✕</button>
  <h2>知识清单</h2>
  <div id="knowledgeList"><div class="empty-state"><div class="icon">📚</div><p>还没有知识，点击 + 添加第一条</p></div></div>
</div>

<div class="detail-backdrop" id="detailBackdrop" onclick="closeDetail()"></div>
<div class="detail-modal" id="detailModal">
  <button class="close-btn" onclick="closeDetail()">✕</button>
  <h2 id="detailTitle"></h2>
  <div class="content" id="detailContent"></div>
  <div class="keywords" id="detailKeywords"></div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-title" id="ttTitle"></div>
  <div class="tt-preview" id="ttPreview"></div>
</div>

<div class="node-count" id="nodeCountBottom">0 个知识节点</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ===== 3D 场景 =====
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.minDistance = 3;
controls.maxDistance = 20;

// 背景粒子
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 2000;
const pos = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount * 3; i++) pos[i] = (Math.random() - 0.5) * 100;
starsGeometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.6 });
const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// 中心微弱光晕
const glowGeom = new THREE.SphereGeometry(0.3, 16, 16);
const glowMat = new THREE.MeshBasicMaterial({ color: 0x5080ff, transparent: true, opacity: 0.2 });
const glowSphere = new THREE.Mesh(glowGeom, glowMat);
scene.add(glowSphere);

// 环境光
scene.add(new THREE.AmbientLight(0x222244));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(1, 2, 1);
scene.add(dirLight);

// 存储节点对象
let sphereGroup = new THREE.Group();
scene.add(sphereGroup);
let linkLines = null;
let nodesData = [];
let linksData = [];
let selectedObject = null;

// ===== 生成随机颜色（HSL）=====
function randomColor(seed) {
  const hue = (seed * 137.508) % 360;
  return new THREE.Color(`hsl(${hue}, 70%, 55%)`);
}

// ===== 绘制知识图谱 =====
function buildGraph(nodes, links) {
  // 清除旧节点
  while(sphereGroup.children.length) sphereGroup.remove(sphereGroup.children[0]);
  if (linkLines) { scene.remove(linkLines); linkLines = null; }

  if (nodes.length === 0) {
    document.getElementById('nodeCountText').textContent = '知识宇宙还很空旷';
    document.getElementById('nodeCountBottom').textContent = '0 个知识节点';
    return;
  }

  // 计算球体在 3D 空间的位置（球形分布）
  const radius = 2.5;
  const nodeObjects = [];
  nodesData = nodes;
  linksData = links;

  nodes.forEach((node, i) => {
    // Fibonacci 球体算法均匀分布
    const phi = Math.acos(1 - 2 * (i + 0.5) / nodes.length);
    const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);
    const x = radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.sin(phi) * Math.sin(theta);
    const z = radius * Math.cos(phi);

    const color = randomColor(i);
    const size = 0.3 + (links.filter(l => l.source === node.id || l.target === node.id).length) * 0.04;

    const geom = new THREE.SphereGeometry(size, 24, 24);
    const mat = new THREE.MeshPhysicalMaterial({
      color,
      metalness: 0.1,
      roughness: 0.3,
      emissive: color,
      emissiveIntensity: 0.15,
      clearcoat: 0.3
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(x, y, z);
    mesh.userData = { nodeId: node.id, originalColor: color };
    sphereGroup.add(mesh);

    // 小球光晕
    const glowGeom2 = new THREE.SphereGeometry(size * 1.8, 16, 16);
    const glowMat2 = new THREE.MeshBasicMaterial({
      color,
      transparent: true,
      opacity: 0.08
    });
    const glowMesh = new THREE.Mesh(glowGeom2, glowMat2);
    glowMesh.position.copy(mesh.position);
    sphereGroup.add(glowMesh);

    nodeObjects.push({ node, mesh });
  });

  // 连接线
  if (links.length > 0) {
    const lineGeom = new THREE.BufferGeometry();
    const positions = [];
    const colors = [];

    links.forEach(link => {
      const source = nodes.find(n => n.id === link.source);
      const target = nodes.find(n => n.id === link.target);
      if (!source || !target) return;

      const i1 = nodes.indexOf(source);
      const i2 = nodes.indexOf(target);
      const p1 = sphereGroup.children[i1 * 2].position;
      const p2 = sphereGroup.children[i2 * 2].position;

      positions.push(p1.x, p1.y, p1.z, p2.x, p2.y, p2.z);
      const c = randomColor(i1);
      colors.push(c.r, c.g, c.b, c.r, c.g, c.b);
    });

    lineGeom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    lineGeom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    const lineMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.25 });
    linkLines = new THREE.LineSegments(lineGeom, lineMat);
    scene.add(linkLines);
  }

  document.getElementById('nodeCountText').textContent = `${nodes.length} 个知识节点`;
  document.getElementById('nodeCountBottom').textContent = `${nodes.length} 个知识节点 · ${links.length} 条关联`;

  // 射线检测（点击球体）
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  renderer.domElement.addEventListener('click', (event) => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const meshes = sphereGroup.children.filter(c => c.type === 'Mesh' && c.geometry.type === 'SphereGeometry');
    const intersects = raycaster.intersectObjects(meshes);
    if (intersects.length > 0) {
      const hit = intersects[0].object;
      const nodeId = hit.userData.nodeId;
      const node = nodes.find(n => n.id === nodeId);
      if (node) showDetail(node);
    }
  });
}

// ===== 从 API 加载数据 =====
async function loadGraph() {
  try {
    const res = await fetch('/api/graph');
    const data = await res.json();
    buildGraph(data.nodes, data.links);
    updateList();
    document.getElementById('loading').classList.add('hidden');
  } catch (e) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('nodeCountText').textContent = '无法连接服务器';
  }
}

// ===== 添加知识 =====
async function addKnowledge() {
  const title = document.getElementById('input-title').value.trim();
  const content = document.getElementById('input-content').value.trim();
  if (!title || !content) { alert('请填写标题和内容'); return; }

  const btn = document.querySelector('#panel-add .submit-btn');
  btn.disabled = true;
  btn.textContent = '存入中...';

  try {
    await fetch('/api/items', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content })
    });
    document.getElementById('input-title').value = '';
    document.getElementById('input-content').value = '';
    loadGraph();
  } catch (e) {
    alert('添加失败：' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '存入知识宇宙';
}

// ===== AI 问答 =====
async function askQuestion() {
  const input = document.getElementById('chatInput');
  const question = input.value.trim();
  if (!question) return;
  input.value = '';

  const messages = document.getElementById('chatMessages');
  messages.insertAdjacentHTML('beforeend', `<div class="chat-msg user">${question}</div>`);
  messages.scrollTop = messages.scrollHeight;

  const thinkingDiv = document.createElement('div');
  thinkingDiv.className = 'chat-msg ai';
  thinkingDiv.textContent = '思考中...';
  messages.appendChild(thinkingDiv);
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });
    const data = await res.json();
    let html = data.answer;
    if (data.sources && data.sources.length > 0) {
      html += '<div class="source">参考：' + data.sources.map(s => s.title).join('、') + '</div>';
    }
    thinkingDiv.innerHTML = html;
  } catch (e) {
    thinkingDiv.textContent = '出错了：' + e.message;
  }
  messages.scrollTop = messages.scrollHeight;
}

// ===== 知识列表 =====
async function updateList() {
  try {
    const res = await fetch('/api/items');
    const items = await res.json();
    const list = document.getElementById('knowledgeList');
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>还没有知识，点击 + 添加第一条</p></div>';
      return;
    }
    list.innerHTML = items.map(item => `
      <div class="knowledge-card" onclick="showDetail(${JSON.stringify(item).replace(/"/g, '&quot;')})">
        <h3>${item.title}</h3>
        <p>${(item.content || '').slice(0, 60)}...</p>
      </div>
    `).join('');
  } catch(e) {}
}

// ===== 详情弹窗 =====
function showDetail(item) {
  document.getElementById('detailTitle').textContent = item.title;
  document.getElementById('detailContent').textContent = item.content || '';
  const kw = document.getElementById('detailKeywords');
  kw.innerHTML = (item.fingerprint || []).slice(0, 10).map(k => `<span>${k}</span>`).join('');
  document.getElementById('detailModal').classList.add('open');
  document.getElementById('detailBackdrop').classList.add('open');
}
function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
  document.getElementById('detailBackdrop').classList.remove('open');
}

// ===== 面板切换 =====
function togglePanel(name) {
  const panel = document.getElementById('panel-' + name);
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
  if (!isOpen) panel.classList.add('open');
}

// ===== 窗口自适应 =====
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===== 动画循环 =====
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  stars.rotation.y += 0.0001;
  renderer.render(scene, camera);
}
animate();

// ===== 启动 =====
loadGraph();
</script>
</body>
</html>
